<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F0EDE8;
  --surface: #FAFAF8;
  --surface2: #EDEBE6;
  --border: #E0DDD6;
  --text: #18160F;
  --text-2: #5C5A54;
  --text-3: #9A9790;
  --green: #1E6B45;
  --green-bg: #E5F3EC;
  --green-mid: #3DAA6E;
  --red: #A0202E;
  --red-bg: #FCEAEC;
  --red-mid: #D9534F;
  --gold: #B8860B;
  --gold-light: #F7F0DC;
  --card-s: #1A1814;
  --card-e: #2E2B24;
  --r: 18px;
  --r-sm: 12px;
  --r-xs: 8px;
  --sh-sm: 0 1px 6px rgba(0,0,0,0.07);
  --sh-md: 0 4px 20px rgba(0,0,0,0.10);
  --sh-lg: 0 12px 48px rgba(0,0,0,0.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100dvh;background:var(--surface);display:flex;flex-direction:column;position:relative;overflow-x:hidden}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:52px 22px 16px;background:var(--surface);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--text)}
.logo span{color:var(--gold)}
.topbar-date{font-size:11.5px;color:var(--text-3);font-weight:500;letter-spacing:0.3px}

/* SCROLL */
.scroll-body{flex:1;overflow-y:auto;padding:20px 18px 110px;scroll-behavior:smooth}
.scroll-body::-webkit-scrollbar{width:0}

/* BALANCE CARD */
.balance-card{background:linear-gradient(140deg,var(--card-s) 0%,var(--card-e) 100%);border-radius:var(--r);padding:28px 26px 24px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:var(--sh-lg)}
.balance-card::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(184,134,11,0.18) 0%,transparent 70%)}
.balance-card::after{content:'';position:absolute;bottom:-60px;left:-30px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(61,170,110,0.10) 0%,transparent 70%)}
.balance-eyebrow{font-size:10.5px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,0.42);margin-bottom:10px;position:relative;z-index:1}
.balance-row{display:flex;align-items:baseline;gap:6px;position:relative;z-index:1}
.balance-currency{font-size:24px;font-weight:300;color:rgba(255,255,255,0.55);line-height:1}
.balance-num{font-family:'Playfair Display',serif;font-size:52px;color:#fff;letter-spacing:-2px;line-height:1;transition:transform 0.25s cubic-bezier(.34,1.56,.64,1)}
.balance-num.pop{transform:scale(1.05)}
.balance-footer{display:flex;gap:20px;margin-top:20px;position:relative;z-index:1}
.bal-stat{display:flex;align-items:center;gap:7px}
.bal-dot{width:8px;height:8px;border-radius:50%}
.bal-dot.in{background:var(--green-mid)}
.bal-dot.out{background:var(--red-mid)}
.bal-text{font-size:12px;color:rgba(255,255,255,0.55)}
.bal-text strong{color:rgba(255,255,255,0.88);font-weight:600}

/* ACTION BUTTONS */
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.action-btn{height:52px;border:none;border-radius:var(--r-sm);font-family:'Sora',sans-serif;font-size:14.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:0.2px;transition:all 0.16s ease;position:relative;overflow:hidden}
.btn-icon{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.action-btn:active{transform:scale(0.96)}
.btn-in{background:var(--green);color:#fff;box-shadow:0 4px 18px rgba(30,107,69,0.30)}
.btn-out{background:var(--red);color:#fff;box-shadow:0 4px 18px rgba(160,32,46,0.30)}
.btn-in:hover{background:#1a5c3b}
.btn-out:hover{background:#8a1b27}

/* SUMMARY */
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;box-shadow:var(--sh-sm)}
.sum-card-inner{display:flex;align-items:center;gap:12px}
.sum-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0}
.sum-icon.in{background:var(--green-bg);color:var(--green)}
.sum-icon.out{background:var(--red-bg);color:var(--red)}
.sum-label{font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
.sum-val{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.sum-val.in{color:var(--green)}
.sum-val.out{color:var(--red)}

/* FILTERS */
.filter-row{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{height:0}
.fpill{flex-shrink:0;font-family:'Sora',sans-serif;font-size:11.5px;font-weight:600;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all 0.15s;letter-spacing:0.3px}
.fpill.active{background:var(--text);border-color:var(--text);color:#fff}
.fpill:not(.active):hover{border-color:var(--text-2);color:var(--text)}

/* TXN LIST */
.section-head{font-size:10.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.grp-label{font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:0.5px;margin:14px 0 8px}
.txn-item{display:flex;align-items:center;gap:13px;padding:13px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;animation:fadeUp 0.22s ease both;transition:box-shadow 0.15s,border-color 0.15s}
.txn-item:hover{box-shadow:var(--sh-md);border-color:#CCC9C0}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.txn-av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.txn-av.in{background:var(--green-bg);color:var(--green)}
.txn-av.out{background:var(--red-bg);color:var(--red)}
.txn-body{flex:1;min-width:0}
.txn-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.txn-sub{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:5px}
.mode-pill{background:var(--surface2);color:var(--text-2);font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:0.4px;text-transform:uppercase}
.txn-amount{font-size:15px;font-weight:700;flex-shrink:0;letter-spacing:-0.3px}
.txn-amount.in{color:var(--green)}
.txn-amount.out{color:var(--red)}
.empty-state{text-align:center;padding:52px 20px}
.empty-icon{font-size:38px;margin-bottom:12px;opacity:0.4}
.empty-text{font-size:13.5px;color:var(--text-3);line-height:1.6}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,9,7,0.55);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex;animation:fadein 0.18s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* SHEET */
.sheet{width:100%;max-width:430px;background:var(--surface);border-radius:24px 24px 0 0;animation:sheetup 0.28s cubic-bezier(0.34,1.56,0.64,1);max-height:92dvh;overflow-y:auto;padding-bottom:36px}
.sheet::-webkit-scrollbar{width:0}
@keyframes sheetup{from{transform:translateY(110%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 0}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 16px;border-bottom:1px solid var(--border)}
.sheet-title-wrap{display:flex;align-items:center;gap:12px}
.sheet-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.sheet-icon.in{background:var(--green-bg);color:var(--green)}
.sheet-icon.out{background:var(--red-bg);color:var(--red)}
.sheet-title{font-family:'Playfair Display',serif;font-size:21px}
.sheet-close{width:32px;height:32px;border:none;background:var(--surface2);border-radius:50%;cursor:pointer;font-size:16px;color:var(--text-2);display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.sheet-close:hover{background:var(--border)}
.sheet-body{padding:22px 22px 0}
.field{margin-bottom:18px}
.field-label{font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.opt-tag{font-size:9px;font-weight:600;background:var(--surface2);color:var(--text-3);padding:2px 6px;border-radius:4px;letter-spacing:0.3px;text-transform:uppercase}
.ctrl{width:100%;padding:13px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Sora',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.15s,background 0.15s;appearance:none;-webkit-appearance:none}
.ctrl:focus{border-color:var(--gold);background:#fff}
.ctrl.error{border-color:var(--red)!important}
.ctrl::placeholder{color:var(--text-3)}
.amt-wrap{position:relative}
.amt-pfx{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px;font-weight:300;color:var(--text-3);pointer-events:none;transition:color 0.15s}
.amt-wrap .ctrl{padding-left:30px;font-size:26px;font-weight:600;letter-spacing:-0.5px}
.amt-wrap:focus-within .amt-pfx{color:var(--text-2)}
.sel-wrap{position:relative}
.sel-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-3);font-size:11px}
.field-err{font-size:11px;color:var(--red);margin-top:5px;display:none;font-weight:500}
.field-err.show{display:block}
.sheet-footer{padding:20px 22px 0}
.submit-btn{width:100%;height:52px;border:none;border-radius:var(--r-sm);font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:0.2px;transition:all 0.16s}
.submit-btn.in{background:var(--green);box-shadow:0 4px 20px rgba(30,107,69,.28)}
.submit-btn.out{background:var(--red);box-shadow:0 4px 20px rgba(160,32,46,.28)}
.submit-btn:hover{opacity:0.9}
.submit-btn:active{transform:scale(0.98)}

/* DATE PICKER */
.dp-wrap{position:relative}
.date-display{cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.date-cal-icon{color:var(--text-3);font-size:15px}
.cal-popup{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);box-shadow:var(--sh-lg);z-index:500;overflow:hidden;animation:calPop 0.18s ease}
.cal-popup.open{display:block}
@keyframes calPop{from{opacity:0;transform:translateY(-6px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.cal-header{display:flex;align-items:center;padding:12px 14px 10px;border-bottom:1px solid var(--border);gap:8px}
.cal-nav{width:30px;height:30px;border:none;background:var(--surface2);border-radius:var(--r-xs);cursor:pointer;font-size:14px;color:var(--text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.12s}
.cal-nav:hover{background:var(--border)}
.cal-month-btn{flex:1;text-align:center;font-size:14px;font-weight:600;cursor:pointer;padding:5px 0;border-radius:var(--r-xs);transition:background 0.12s;color:var(--text)}
.cal-month-btn:hover{background:var(--surface2)}
.cal-day-view{padding:10px 12px 12px}
.cal-wds{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-wd{text-align:center;font-size:10px;font-weight:700;letter-spacing:0.5px;color:var(--text-3);padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:500;border-radius:var(--r-xs);cursor:pointer;color:var(--text);transition:background 0.12s,color 0.12s}
.cal-day:hover:not(.empty):not(.selected){background:var(--surface2)}
.cal-day.other-month{color:var(--text-3)}
.cal-day.today:not(.selected){background:var(--gold-light);color:var(--gold);font-weight:700}
.cal-day.selected{background:var(--text);color:#fff;font-weight:700}
.cal-day.empty{pointer-events:none}
.cal-month-view{display:none;padding:10px 12px 12px;grid-template-columns:repeat(3,1fr);gap:6px}
.cal-month-view.active{display:grid}
.cal-month-item{padding:9px 0;text-align:center;font-size:12.5px;font-weight:500;border-radius:var(--r-xs);cursor:pointer;transition:background 0.12s}
.cal-month-item:hover{background:var(--surface2)}
.cal-month-item.selected{background:var(--text);color:#fff;font-weight:700}
.cal-year-view{display:none;padding:10px 12px 12px;grid-template-columns:repeat(4,1fr);gap:6px;max-height:220px;overflow-y:auto}
.cal-year-view::-webkit-scrollbar{width:3px}
.cal-year-view::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cal-year-view.active{display:grid}
.cal-year-item{padding:8px 0;text-align:center;font-size:12px;font-weight:500;border-radius:var(--r-xs);cursor:pointer;transition:background 0.12s}
.cal-year-item:hover{background:var(--surface2)}
.cal-year-item.selected{background:var(--text);color:#fff;font-weight:700}
.cal-footer{border-top:1px solid var(--border);padding:9px 12px;display:flex;justify-content:center}
.cal-today-btn{font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--gold);background:var(--gold-light);border:none;border-radius:20px;padding:6px 18px;cursor:pointer;transition:all 0.14s;letter-spacing:0.3px}
.cal-today-btn:hover{background:#EFE6C0}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="logo">Flow<span>Track</span></div>
    <div class="topbar-date" id="todayLabel"></div>
  </div>

  <div class="scroll-body">

    <!-- 1. BALANCE CARD -->
    <div class="balance-card">
      <div class="balance-eyebrow">Current Balance</div>
      <div class="balance-row">
        <span class="balance-currency">₹</span>
        <span class="balance-num" id="balNum">0</span>
      </div>

    </div>

    <!-- 2. SUMMARY -->
    <div class="summary-row">
      <div class="sum-card">
        <div class="sum-card-inner">
          <div class="sum-icon in">↑</div>
          <div>
            <div class="sum-label">Cash In</div>
            <div class="sum-val in" id="sumIn">₹0</div>
          </div>
        </div>
      </div>
      <div class="sum-card">
        <div class="sum-card-inner">
          <div class="sum-icon out">↓</div>
          <div>
            <div class="sum-label">Cash Out</div>
            <div class="sum-val out" id="sumOut">₹0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. ACTION BUTTONS -->
    <div class="action-row">
      <button class="action-btn btn-in" onclick="openSheet('in')">
        <span class="btn-icon">↑</span> Cash In
      </button>
      <button class="action-btn btn-out" onclick="openSheet('out')">
        <span class="btn-icon">↓</span> Cash Out
      </button>
    </div>

    <!-- 4. FILTERS -->
    <div class="filter-row">
      <button class="fpill active" data-f="all">All</button>
      <button class="fpill" data-f="daily">Today</button>
      <button class="fpill" data-f="weekly">Week</button>
      <button class="fpill" data-f="monthly">Month</button>
      <button class="fpill" data-f="yearly">Year</button>
    </div>

    <!-- 5. LIST -->
    <div class="section-head" id="listHead">All Transactions</div>
    <div id="txnList"></div>

  </div>
</div>

<!-- SHEET MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title-wrap">
        <div class="sheet-icon" id="sheetIcon"></div>
        <div class="sheet-title" id="sheetTitle"></div>
      </div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body">

      <!-- AMOUNT -->
      <div class="field">
        <div class="field-label">Amount</div>
        <div class="amt-wrap">
          <input class="ctrl" type="number" id="fAmount" placeholder="0" min="0.01" step="any" inputmode="decimal">
          <span class="amt-pfx">₹</span>
        </div>
        <div class="field-err" id="errAmt">Please enter a valid amount greater than 0.</div>
      </div>

      <!-- MODE -->
      <div class="field">
        <div class="field-label">Mode</div>
        <div class="sel-wrap">
          <select class="ctrl" id="fMode">
            <option value="" disabled selected>Select Mode</option>
            <option value="Google Pay">Google Pay</option>
            <option value="Cash">Cash</option>
          </select>
          <span class="sel-arrow">▾</span>
        </div>
        <div class="field-err" id="errMode">Please select a payment mode.</div>
      </div>

      <!-- DATE -->
      <div class="field">
        <div class="field-label">Date</div>
        <div class="dp-wrap">
          <div class="ctrl date-display" id="dateDisplay" onclick="toggleCal(event)">
            <span id="dateDisplayText">Today</span>
            <span class="date-cal-icon">📅</span>
          </div>
          <div class="cal-popup" id="calPopup">
            <div class="cal-header">
              <button class="cal-nav" id="calPrev" onclick="calNav(-1)">‹</button>
              <div class="cal-month-btn" id="calMonthBtn" onclick="toggleCalView()"></div>
              <button class="cal-nav" id="calNext" onclick="calNav(1)">›</button>
            </div>
            <div class="cal-day-view" id="calDayView">
              <div class="cal-wds">
                <div class="cal-wd">Su</div><div class="cal-wd">Mo</div><div class="cal-wd">Tu</div>
                <div class="cal-wd">We</div><div class="cal-wd">Th</div><div class="cal-wd">Fr</div><div class="cal-wd">Sa</div>
              </div>
              <div class="cal-days" id="calDays"></div>
            </div>
            <div class="cal-month-view" id="calMonthView"></div>
            <div class="cal-year-view" id="calYearView"></div>
            <div class="cal-footer">
              <button class="cal-today-btn" onclick="pickToday()">Go to Today</button>
            </div>
          </div>
        </div>
      </div>

      <!-- NOTES -->
      <div class="field">
        <div class="field-label">Notes <span class="opt-tag">Optional</span></div>
        <input class="ctrl" type="text" id="fNotes" placeholder="What's this for?">
      </div>

    </div>
    <div class="sheet-footer">
      <button class="submit-btn" id="submitBtn" onclick="saveTxn()">Add Transaction</button>
    </div>
  </div>
</div>

<script>
/* DATA */
let txns = JSON.parse(localStorage.getItem('ft_v3') || '[]');
let curFilter = 'all';
let curType = 'in';
function persist(){ localStorage.setItem('ft_v3', JSON.stringify(txns)); }
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fmt(n){
  return '₹' + Math.abs(n).toLocaleString('en-IN',{maximumFractionDigits:2});
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* TOP BAR */
document.getElementById('todayLabel').textContent =
  new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

/* FILTERS */
document.querySelectorAll('.fpill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    curFilter = btn.dataset.f;
    render();
  });
});

function filteredTxns(){
  const now = new Date();
  return txns.filter(t=>{
    const d = new Date(t.date+'T00:00:00');
    if(curFilter==='all') return true;
    if(curFilter==='daily') return d.toDateString()===now.toDateString();
    if(curFilter==='weekly'){
      const s=new Date(now); s.setDate(now.getDate()-now.getDay()); s.setHours(0,0,0,0);
      return d>=s;
    }
    if(curFilter==='monthly') return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(curFilter==='yearly') return d.getFullYear()===now.getFullYear();
    return true;
  });
}

/* RENDER */
function render(){
  const list = filteredTxns();
  let ti=0, to=0;
  list.forEach(t=>{ t.type==='in'?(ti+=t.amount):(to+=t.amount); });
  const bal = ti-to;

  const balEl = document.getElementById('balNum');
  const balFmt = bal.toLocaleString('en-IN',{maximumFractionDigits:2});
  if(balEl.textContent!==balFmt){
    balEl.textContent=balFmt;
    balEl.classList.add('pop');
    setTimeout(()=>balEl.classList.remove('pop'),280);
  }
  document.getElementById('sumIn').textContent  = fmt(ti);
  document.getElementById('sumOut').textContent = fmt(to);

  const labels={all:'All',daily:"Today's",weekly:"This Week's",monthly:"This Month's",yearly:"This Year's"};
  document.getElementById('listHead').textContent = labels[curFilter]+' Transactions';

  const container = document.getElementById('txnList');
  if(!list.length){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">💸</div><div class="empty-text">No transactions yet.<br>Tap Cash In or Cash Out to begin.</div></div>`;
    return;
  }

  const groups={};
  [...list].sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{
    (groups[t.date]=groups[t.date]||[]).push(t);
  });

  const todS=todayStr();
  let html='';
  for(const [date,items] of Object.entries(groups)){
    const d=new Date(date+'T00:00:00');
    const lbl=date===todS?'Today':d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
    html+=`<div class="grp-label">${lbl}</div>`;
    items.forEach(t=>{
      const title=t.notes||(t.type==='in'?'Cash In':'Cash Out');
      const sign=t.type==='in'?'+':'−';
      const mp=t.mode==='Google Pay'?'UPI':'CASH';
      html+=`<div class="txn-item">
        <div class="txn-av ${t.type}">${t.type==='in'?'↑':'↓'}</div>
        <div class="txn-body">
          <div class="txn-title">${esc(title)}</div>
          <div class="txn-sub">${esc(t.mode)} <span class="mode-pill">${mp}</span></div>
        </div>
        <div class="txn-amount ${t.type}">${sign}${fmt(t.amount)}</div>
      </div>`;
    });
  }
  container.innerHTML=html;
}

/* SHEET */
function openSheet(type){
  curType=type;
  document.getElementById('sheetIcon').className=`sheet-icon ${type}`;
  document.getElementById('sheetIcon').textContent=type==='in'?'↑':'↓';
  document.getElementById('sheetTitle').textContent=type==='in'?'Cash In':'Cash Out';
  document.getElementById('submitBtn').className=`submit-btn ${type}`;
  document.getElementById('submitBtn').textContent=type==='in'?'Add Cash In':'Add Cash Out';
  document.getElementById('fAmount').value='';
  document.getElementById('fMode').value='';
  document.getElementById('fNotes').value='';
  ['fAmount','fMode'].forEach(id=>document.getElementById(id).classList.remove('error'));
  ['errAmt','errMode'].forEach(id=>document.getElementById(id).classList.remove('show'));
  cal.selected=todayStr();
  const p=todayStr().split('-');
  cal.vy=parseInt(p[0]); cal.vm=parseInt(p[1])-1; cal.mode='day';
  updateDateDisplay(); renderCal();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fAmount').focus(),330);
}
function closeSheet(){ document.getElementById('overlay').classList.remove('open'); closeCalPopup(); }
function handleOverlay(e){ if(e.target===document.getElementById('overlay')) closeSheet(); }

/* SAVE */
function saveTxn(){
  let ok=true;
  const amtEl=document.getElementById('fAmount');
  const amt=parseFloat(amtEl.value);
  if(!amt||amt<=0){
    amtEl.classList.add('error');
    document.getElementById('errAmt').classList.add('show');
    ok=false;
  } else {
    amtEl.classList.remove('error');
    document.getElementById('errAmt').classList.remove('show');
  }
  const modeEl=document.getElementById('fMode');
  if(!modeEl.value){
    modeEl.classList.add('error');
    document.getElementById('errMode').classList.add('show');
    ok=false;
  } else {
    modeEl.classList.remove('error');
    document.getElementById('errMode').classList.remove('show');
  }
  if(!ok) return;
  txns.unshift({id:Date.now(),type:curType,amount:amt,mode:modeEl.value,date:cal.selected,notes:document.getElementById('fNotes').value.trim()});
  persist(); closeSheet(); render();
}

/* CALENDAR */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const cal={ selected:todayStr(), vy:new Date().getFullYear(), vm:new Date().getMonth(), mode:'day' };

function toggleCal(e){ e.stopPropagation(); const p=document.getElementById('calPopup'); p.classList.contains('open')?closeCalPopup():openCalPopup(); }
function openCalPopup(){ document.getElementById('calPopup').classList.add('open'); renderCal(); }
function closeCalPopup(){ document.getElementById('calPopup').classList.remove('open'); }

function updateDateDisplay(){
  const [y,m,d]=cal.selected.split('-').map(Number);
  const date=new Date(y,m-1,d);
  const todS=todayStr();
  document.getElementById('dateDisplayText').textContent=
    cal.selected===todS?'Today — '+date.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})
    :date.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}

function calNav(dir){
  if(cal.mode==='day'){ cal.vm+=dir; if(cal.vm>11){cal.vm=0;cal.vy++;}if(cal.vm<0){cal.vm=11;cal.vy--;} }
  else if(cal.mode==='year'){ cal.vy+=dir*12; }
  renderCal();
}
function toggleCalView(){
  cal.mode=cal.mode==='day'?'month':cal.mode==='month'?'year':'day';
  renderCal();
}

function renderCal(){
  const btn=document.getElementById('calMonthBtn');
  if(cal.mode==='day') btn.textContent=MONTHS[cal.vm]+' '+cal.vy;
  else if(cal.mode==='month') btn.textContent=String(cal.vy);
  else btn.textContent=`${cal.vy} – ${cal.vy+11}`;

  const showNav=cal.mode!=='month';
  document.getElementById('calPrev').style.visibility=showNav?'visible':'hidden';
  document.getElementById('calNext').style.visibility=showNav?'visible':'hidden';

  document.getElementById('calDayView').style.display=cal.mode==='day'?'':'none';
  document.getElementById('calMonthView').classList.toggle('active',cal.mode==='month');
  document.getElementById('calYearView').classList.toggle('active',cal.mode==='year');

  if(cal.mode==='day') renderDayGrid();
  else if(cal.mode==='month') renderMonthGrid();
  else renderYearGrid();
}

function renderDayGrid(){
  const first=new Date(cal.vy,cal.vm,1).getDay();
  const dim=new Date(cal.vy,cal.vm+1,0).getDate();
  const tod=todayStr();
  let html='';
  for(let i=0;i<first;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${cal.vy}-${pad(cal.vm+1)}-${pad(d)}`;
    const cls=['cal-day',ds===tod?'today':'',ds===cal.selected?'selected':''].join(' ');
    html+=`<div class="${cls}" onclick="pickDay('${ds}')">${d}</div>`;
  }
  document.getElementById('calDays').innerHTML=html;
}

function renderMonthGrid(){
  const sy=parseInt(cal.selected.split('-')[0]);
  const sm=parseInt(cal.selected.split('-')[1])-1;
  let html='';
  MONTHS.forEach((m,i)=>{
    const sel=cal.vy===sy&&i===sm;
    html+=`<div class="cal-month-item${sel?' selected':''}" onclick="pickMonth(${i})">${m.slice(0,3)}</div>`;
  });
  document.getElementById('calMonthView').innerHTML=html;
}

function renderYearGrid(){
  const sy=parseInt(cal.selected.split('-')[0]);
  let html='';
  for(let y=cal.vy;y<cal.vy+12;y++){
    html+=`<div class="cal-year-item${y===sy?' selected':''}" onclick="pickYear(${y})">${y}</div>`;
  }
  document.getElementById('calYearView').innerHTML=html;
  setTimeout(()=>{ const s=document.querySelector('.cal-year-item.selected'); if(s) s.scrollIntoView({block:'center',behavior:'smooth'}); },50);
}

function pickDay(ds){ cal.selected=ds; updateDateDisplay(); closeCalPopup(); renderCal(); }
function pickMonth(mi){ cal.vm=mi; cal.mode='day'; renderCal(); }
function pickYear(y){ cal.vy=y; cal.mode='month'; renderCal(); }
function pickToday(){
  const t=todayStr(); const [y,m]=t.split('-').map(Number);
  cal.selected=t; cal.vy=y; cal.vm=m-1; cal.mode='day';
  updateDateDisplay(); renderCal(); closeCalPopup();
}

// Close calendar on outside click
document.addEventListener('click',e=>{
  const wrap=document.querySelector('.dp-wrap');
  if(wrap&&!wrap.contains(e.target)) closeCalPopup();
});

/* INIT */
updateDateDisplay();
render();
</script>
